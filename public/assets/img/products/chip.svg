<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Procesador</title>
  <desc id="desc">Ilustración estilizada de un procesador para catálogo de tienda.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#23153f" />
      <stop offset="100%" stop-color="#09111f" />
    </linearGradient>
    <linearGradient id="chip" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7b955" />
      <stop offset="100%" stop-color="#ff7f50" />
    </linearGradient>
  </defs>
  <rect width="900" height="600" rx="40" fill="url(#bg)"/>
  <rect x="265" y="120" width="370" height="370" rx="30" fill="#121a30" stroke="#4ea1ff" stroke-width="8"/>
  <rect x="325" y="180" width="250" height="250" rx="22" fill="url(#chip)"/>
  <circle cx="450" cy="305" r="74" fill="#0d1727"/>
  <text x="450" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" fill="#eaf4ff" font-weight="700">CPU</text>
