    <rect x="155" y="170" width="72" height="20" rx="10"/>
    <rect x="155" y="228" width="72" height="20" rx="10"/>
    <rect x="155" y="286" width="72" height="20" rx="10"/>
    <rect x="155" y="344" width="72" height="20" rx="10"/>
    <rect x="673" y="170" width="72" height="20" rx="10"/>
    <rect x="673" y="228" width="72" height="20" rx="10"/>
    <rect x="673" y="286" width="72" height="20" rx="10"/>
    <rect x="673" y="344" width="72" height="20" rx="10"/>
  </g>
