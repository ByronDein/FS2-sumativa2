<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Teclado mecánico</title>
  <desc id="desc">Ilustración estilizada de un teclado mecánico RGB para catálogo de tienda.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#25173c" />
      <stop offset="100%" stop-color="#09111f" />
    </linearGradient>
    <linearGradient id="keys" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4ea1ff" />
      <stop offset="100%" stop-color="#14c9a8" />
    </linearGradient>
  </defs>
  <rect width="900" height="600" rx="40" fill="url(#bg)"/>
  <rect x="140" y="200" width="620" height="180" rx="30" fill="#101c31" stroke="url(#keys)" stroke-width="8"/>
  <g fill="#dfe9ff" fill-opacity=".9">
    <rect x="190" y="245" width="55" height="35" rx="8"/>
    <rect x="260" y="245" width="55" height="35" rx="8"/>
    <rect x="330" y="245" width="55" height="35" rx="8"/>
    <rect x="400" y="245" width="55" height="35" rx="8"/>
    <rect x="470" y="245" width="55" height="35" rx="8"/>
    <rect x="540" y="245" width="55" height="35" rx="8"/>
    <rect x="610" y="245" width="55" height="35" rx="8"/>
    <rect x="680" y="245" width="55" height="35" rx="8"/>
    <rect x="215" y="295" width="430" height="35" rx="8"/>
  </g>
  <text x="450" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" fill="#eaf4ff" font-weight="700">RGB KEYBOARD</text>
</svg>
