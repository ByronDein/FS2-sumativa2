<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Monitor</title>
  <desc id="desc">Ilustración estilizada de un monitor para catálogo de tienda.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f2749" />
      <stop offset="100%" stop-color="#09111f" />
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4ea1ff" />
      <stop offset="50%" stop-color="#14c9a8" />
      <stop offset="100%" stop-color="#f7b955" />
    </linearGradient>
  </defs>
  <rect width="900" height="600" rx="40" fill="url(#bg)"/>
  <rect x="220" y="120" width="460" height="290" rx="24" fill="#101c31" stroke="url(#screen)" stroke-width="10"/>
  <rect x="250" y="150" width="400" height="230" rx="16" fill="#12233f"/>
  <rect x="405" y="418" width="90" height="80" rx="12" fill="#dfe9ff"/>
  <rect x="330" y="488" width="240" height="22" rx="11" fill="#7f91a9"/>
  <text x="450" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" fill="#eaf4ff" font-weight="700">MONITOR</text>
</svg>
