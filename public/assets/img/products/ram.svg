<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Memoria RAM</title>
  <desc id="desc">Ilustración estilizada de módulos de memoria RAM para catálogo de tienda.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1c203d" />
      <stop offset="100%" stop-color="#09111f" />
    </linearGradient>
    <linearGradient id="ram" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#14c9a8" />
      <stop offset="100%" stop-color="#4ea1ff" />
    </linearGradient>
  </defs>
  <rect width="900" height="600" rx="40" fill="url(#bg)"/>
  <rect x="160" y="210" width="250" height="120" rx="18" fill="url(#ram)"/>
  <rect x="430" y="210" width="250" height="120" rx="18" fill="url(#ram)"/>
  <rect x="205" y="255" width="160" height="22" rx="11" fill="#09111f" fill-opacity=".45"/>
  <rect x="475" y="255" width="160" height="22" rx="11" fill="#09111f" fill-opacity=".45"/>
  <g fill="#dfe9ff">
    <rect x="165" y="350" width="240" height="18" rx="9"/>
    <rect x="435" y="350" width="240" height="18" rx="9"/>
  </g>
  <text x="450" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" fill="#eaf4ff" font-weight="700">RAM</text>
</svg>
