<main class="container py-4">
  <div
    *ngIf="alert"
    class="alert alert-{{ alert.type }} alert-dismissible fade show mb-3"
    role="alert"
  >
    {{ alert.message }}
    <button type="button" class="btn-close" aria-label="Cerrar" (click)="alert = null"></button>
  </div>

  <section class="surface-panel">
    <span class="eyebrow">Perfil</span>
    <h1 class="h3 fw-bold mb-2">Modificar datos personales</h1>
    <p class="text-secondary mb-4">
      Actualiza tus datos. La contrasena solo cambia si escribes una nueva.
    </p>

    <form class="row g-3" [formGroup]="form" (ngSubmit)="submit()">
      <div class="col-12 col-md-6">
        <label class="form-label" for="name">Nombre</label>
        <input class="form-control" id="name" formControlName="name" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label" for="email">Correo</label>
        <input class="form-control" id="email" type="email" formControlName="email" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label" for="phone">Telefono</label>
        <input class="form-control" id="phone" formControlName="phone" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label" for="birthDate">Fecha de nacimiento</label>
        <input class="form-control" id="birthDate" type="date" formControlName="birthDate" />
      </div>
      <div class="col-12">
        <label class="form-label" for="address">Direccion</label>
        <input class="form-control" id="address" formControlName="address" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label" for="password">Nueva contrasena</label>
        <input class="form-control" id="password" type="password" formControlName="password" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label" for="confirm">Confirmar</label>
        <input class="form-control" id="confirm" type="password" formControlName="confirm" />
        <div
          class="invalid-feedback d-block"
          *ngIf="form.touched && form.hasError('fieldsMismatch')"
        >
          Las contrasenas no coinciden.
        </div>
      </div>
      <div class="col-12">
        <div class="password-hints">
          <div
            *ngFor="let rule of ruleLabels"
            [class.hint-ok]="passwordRules()[rule.key]"
            [class.hint-bad]="!passwordRules()[rule.key]"
          >
            {{ passwordRules()[rule.key] ? 'OK' : 'NO' }} - {{ rule.label }}
          </div>
        </div>
      </div>
      <div class="col-12 d-grid d-md-block">
        <button class="btn btn-primary" type="submit">Guardar perfil</button>
      </div>
    </form>
  </section>
</main>
