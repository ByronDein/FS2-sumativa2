<main class="container py-4">
  <div *ngIf="alert" class="alert alert-{{ alert.type }} alert-dismissible fade show mb-3" role="alert">
    {{ alert.message }}
    <button type="button" class="btn-close" aria-label="Cerrar" (click)="alert = null"></button>
  </div>

  <section class="surface-panel">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <span class="eyebrow">Carrito</span>
        <h1 class="h3 fw-bold mb-0">Vista dedicada del carrito</h1>
      </div>
      <strong class="cart-total">{{ storage.money(cart.total()) }}</strong>
    </div>

    <div class="stack-list">
      <div class="cart-item" *ngFor="let row of cart.rows()">
        <div class="d-flex justify-content-between gap-2">
          <div>
            <strong>{{ row.product.name }}</strong>
            <div class="small text-secondary">{{ row.product.category }}</div>
          </div>
          <button class="btn btn-sm btn-outline-light" type="button" (click)="cart.remove(row.productId)">Eliminar</button>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-2">
          <div class="input-group input-group-sm" style="max-width: 120px">
            <button class="btn btn-outline-light" type="button" (click)="cart.minus(row.productId)">-</button>
            <input class="form-control text-center" [value]="row.qty" readonly>
            <button class="btn btn-outline-light" type="button" (click)="cart.plus(row.productId)">+</button>
          </div>
          <strong>{{ storage.money(row.subtotal) }}</strong>
        </div>
      </div>
      <div class="text-secondary" *ngIf="!cart.rows().length">No hay productos en el carrito.</div>
    </div>

    <hr>
    <div class="d-grid d-md-flex justify-content-md-end">
      <button class="btn btn-primary" type="button" (click)="checkout()">Simular pago</button>
    </div>
  </section>
</main>
