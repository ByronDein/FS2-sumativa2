<article class="product-card h-100 d-flex flex-column">
  <div class="product-media">
    <img [src]="product.image" [alt]="product.name" class="w-100" />
  </div>
  <div class="p-3 d-flex flex-column flex-grow-1">
    <div class="d-flex justify-content-between gap-2 align-items-start">
      <div class="flex-grow-1">
        <span class="badge text-bg-secondary">{{ product.category }}</span>
        <h3 class="h6 mt-2 mb-1 product-title">{{ product.name }}</h3>
        <div class="small text-secondary">{{ product.brand }}</div>
      </div>
      <span *ngIf="product.featured" class="badge text-bg-warning">Top</span>
    </div>
    <p class="small text-secondary mt-2 product-description">{{ product.description }}</p>
    <div class="mt-auto pt-2 d-flex justify-content-between align-items-end gap-2 product-footer">
      <div>
        <div class="price">{{ storage.money(product.price) }}</div>
        <div class="small text-secondary">Stock {{ product.stock }}</div>
      </div>
      <button
        class="btn btn-primary btn-sm text-nowrap"
        type="button"
        [disabled]="product.stock <= 0"
        (click)="add()"
      >
        Agregar
      </button>
    </div>
  </div>
</article>
