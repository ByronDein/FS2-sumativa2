<header class="navbar navbar-expand-lg navbar-dark topbar sticky-top">
  <div class="container-fluid px-3 px-md-4">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold" routerLink="/">
      <span class="brand-mark">TM</span>
      <span>TechMart Pro</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav" aria-label="Abrir menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="topNav">
      <nav class="navbar-nav ms-auto">
        <ng-container *ngIf="auth.currentUser() as user; else guestLinks">
          <a class="nav-link" routerLink="/tienda" routerLinkActive="active fw-semibold">Tienda</a>
          <a class="nav-link" routerLink="/carrito" routerLinkActive="active fw-semibold">Carrito</a>
          <a class="nav-link" routerLink="/perfil" routerLinkActive="active fw-semibold">Perfil</a>
          <a *ngIf="user.role === 'admin'" class="nav-link" routerLink="/admin" routerLinkActive="active fw-semibold">Admin</a>
          <button class="btn btn-outline-danger btn-sm ms-lg-2 mt-2 mt-lg-0" type="button" (click)="logout()">Salir</button>
        </ng-container>
        <ng-template #guestLinks>
          <a class="nav-link" routerLink="/login" routerLinkActive="active fw-semibold">Ingresar</a>
          <a class="nav-link" routerLink="/registro" routerLinkActive="active fw-semibold">Registro</a>
          <a class="nav-link" routerLink="/recuperar" routerLinkActive="active fw-semibold">Recuperar</a>
        </ng-template>
      </nav>
    </div>
  </div>
</header>
